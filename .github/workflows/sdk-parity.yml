name: SDK Parity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir sdks/typescript build
      - run: pnpm --dir sdks/typescript test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e 'sdks/python[dev]'
      - run: python -m build --sdist --wheel sdks/python
      - run: python -m pytest sdks/python/tests

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
        working-directory: sdks/go
      - run: go test ./...
        working-directory: sdks/go

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -q -DskipTests package
        working-directory: sdks/java
      - run: mvn -q test
        working-directory: sdks/java

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet build Rulebound.Tests/Rulebound.Tests.csproj -c Release
        working-directory: sdks/dotnet
      - run: dotnet test Rulebound.Tests/Rulebound.Tests.csproj -c Release
        working-directory: sdks/dotnet

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
        working-directory: sdks/rust
      - run: cargo test
        working-directory: sdks/rust
