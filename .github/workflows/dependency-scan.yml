name: Dependency Scan

# AMP91-SEC-002 — dependency vulnerability scan.
#
# Runs on a different schedule than Core CI so a slow nightly scan never
# blocks PR throughput. Thresholds per lead verdict C6:
#   - high / critical severity: FAIL the job (release-blocking).
#   - moderate: WARN only (job stays green, release notes record).
#   - low / informational: ignored at the gate; surfaced in the report.
#
# Threat-model + waiver policy: docs/threat-model/dependency-scan.md.
# Secret-scan history companion: jobs/secret-scan-history below.

on:
  # PRs touching dependency manifests get a fast scan.
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/**/package.json"
      - "apps/**/package.json"
      - "sdks/typescript/package.json"
      - "sdks/python/pyproject.toml"
      - "sdks/go/go.mod"
      - "sdks/go/go.sum"
      - "sdks/rust/Cargo.toml"
      - "sdks/rust/Cargo.lock"
      - "sdks/dotnet/**/*.csproj"
      - "sdks/dotnet/**/packages.lock.json"
      - "audit-ci.json"
      - ".github/workflows/dependency-scan.yml"
  # Nightly full scan including secret-scan history pass.
  schedule:
    - cron: "17 4 * * *"
  # Operator-on-demand.
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit lands. The
# nightly job uses a different ref pattern, so this only affects PR runs.
concurrency:
  group: dependency-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pnpm-audit:
    name: pnpm audit (JS / TS workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # High / critical = FAIL; moderate = warn-only (separate step).
      - name: pnpm audit (high+, fail on findings)
        run: pnpm audit --audit-level=high
        # No `continue-on-error` — high/critical is a hard fail per
        # lead C6. Waivers go through audit-ci.json (see below).

      - name: pnpm audit (moderate, warn-only)
        if: always()
        run: |
          set +e
          pnpm audit --audit-level=moderate --json > moderate-audit.json
          STATUS=$?
          if [ "$STATUS" -ne 0 ]; then
            echo "::warning::pnpm audit found moderate-severity vulnerabilities — review for release notes."
            jq '.advisories // {}' moderate-audit.json || cat moderate-audit.json
          fi
          # Always succeed; the high+ step above is the binding gate.
          exit 0

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-${{ github.run_id }}
          path: moderate-audit.json
          retention-days: 30

  python-audit:
    name: pip-audit (Python SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      # pip-audit can read pyproject.toml directly; we still install the
      # SDK in editable mode so its transitive httpx pin shows up in the
      # active environment.
      - name: Install Python SDK
        run: python -m pip install -e 'sdks/python[dev]'

      - name: pip-audit (high+, fail on findings)
        # pip-audit's exit code is 1 if any vulnerability is found,
        # regardless of severity. The OSV vulnerability service exposes
        # severity scores; PyPI's advisory service typically leaves
        # `severity` blank, which would let high CVEs slip through the
        # filter (AMP91-SEC-002-FOLLOWUP-04). We use `--vulnerability-service
        # osv` so severity is populated; if the field is still missing on
        # any vuln we conservatively treat the finding as high+ so it
        # cannot bypass the gate.
        run: |
          set +e
          pip-audit \
            --strict \
            --vulnerability-service osv \
            --format json \
            --output pip-audit.json \
            --requirement <(pip freeze)
          STATUS=$?
          if [ ! -f pip-audit.json ]; then
            echo "pip-audit produced no report — treating as failure."
            exit 1
          fi
          # Conservative classification: any vuln without a severity is treated
          # as high+ so missing-severity findings cannot bypass the C6 threshold.
          HIGH=$(jq '[.dependencies[].vulns[] | select((.severity? // "") | ascii_downcase | (test("high|critical") or . == ""))] | length' pip-audit.json 2>/dev/null || echo 0)
          MODERATE=$(jq '[.dependencies[].vulns[] | select((.severity? // "") | ascii_downcase | test("moderate|medium"))] | length' pip-audit.json 2>/dev/null || echo 0)
          echo "pip-audit summary: high+=$HIGH, moderate=$MODERATE, exit=$STATUS"
          if [ "$HIGH" -gt 0 ]; then
            jq '.dependencies[] | select(.vulns | length > 0)' pip-audit.json
            exit 1
          fi
          if [ "$MODERATE" -gt 0 ]; then
            echo "::warning::pip-audit found $MODERATE moderate-severity vulnerabilities in the Python SDK."
          fi
          exit 0

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-${{ github.run_id }}
          path: pip-audit.json
          retention-days: 30

  go-vulncheck:
    name: govulncheck (Go SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # govulncheck exits non-zero on any vulnerability. v0.1: every
      # finding fails the gate (the Go SDK is a thin HTTP client; the
      # blast radius of a moderate-severity stdlib issue justifies the
      # strictness).
      - name: govulncheck
        working-directory: sdks/go
        run: govulncheck ./...

  rust-audit:
    name: cargo audit (Rust SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # cargo-audit exits non-zero on any vulnerability. Per lead C6 we
      # downgrade moderate to warn-only via the `--ignore` flag wired to
      # `sdks/rust/.cargo-audit.toml` (see waiver section below); high
      # and critical RUSTSEC advisories remain hard fails.
      - name: cargo audit
        working-directory: sdks/rust
        run: cargo audit --deny warnings

  dotnet-vuln:
    name: dotnet list --vulnerable (.NET SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET SDK
        working-directory: sdks/dotnet
        run: dotnet restore Rulebound/Rulebound.csproj

      # `dotnet list package --vulnerable --include-transitive` exits 0
      # even when vulnerabilities are listed; the only signal is the
      # textual output. We grep for severity labels and translate to
      # exit code per lead C6.
      - name: dotnet list package --vulnerable --include-transitive
        working-directory: sdks/dotnet
        run: |
          set +e
          dotnet list Rulebound/Rulebound.csproj package \
            --vulnerable --include-transitive \
            > dotnet-vuln.txt 2>&1
          STATUS=$?
          cat dotnet-vuln.txt
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::dotnet list package exited non-zero."
            exit 1
          fi
          if grep -Eq '(High|Critical)' dotnet-vuln.txt; then
            echo "::error::High/Critical .NET package vulnerabilities found."
            exit 1
          fi
          if grep -Eq '(Moderate|Medium)' dotnet-vuln.txt; then
            echo "::warning::Moderate .NET package vulnerabilities found."
          fi
          exit 0

      - name: Upload dotnet-vuln report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-vuln-${{ github.run_id }}
          path: sdks/dotnet/dotnet-vuln.txt
          retention-days: 30

  # Java SDK: defer to Dependabot per arch-c plan (running
  # `dependency-check` is too expensive on CI for v0.1). The repo's
  # Dependabot config is the binding mechanism; this job exists as a
  # documentation anchor so the absence is intentional, not forgotten.
  java-info:
    name: Java SDK (defer to Dependabot)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Note Java vulnerability scan delegated to Dependabot
        run: |
          echo "Java SDK vulnerability scanning is delegated to Dependabot."
          echo "See docs/threat-model/dependency-scan.md §3 for rationale."
          echo "Re-evaluate once the Java SDK ships >= 5 third-party deps."

  secret-scan-history:
    # Nightly + on-demand only; PRs use the PR-triggered secret-scan in
    # ci.yml or local pre-commit. This catches secrets that may have been
    # squash-merged or force-pushed to main, plus any FP regressions
    # introduced by upstream gitleaks rule updates.
    name: Secret scan (git history)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Secret scan (full history)
        run: bash scripts/secret-scan.sh --history

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-history-${{ github.run_id }}
          path: gitleaks-report.json
          retention-days: 90
